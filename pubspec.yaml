name: flow_avatar
description: >-
  Deterministic animated multi-pattern avatars for Flutter. Stable visual
  identity from any string seed, with mesh, dither, plasma, ribbon, and noise
  patterns plus conversational states and no image assets.
version: 0.3.0
repository: https://github.com/nasawz/flow_avatar
homepage: https://github.com/nasawz/flow_avatar
issue_tracker: https://github.com/nasawz/flow_avatar/issues
topics:
  - avatar
  - animation
  - ui
  - flutter
  - generative

environment:
  sdk: ^3.11.5
  flutter: ">=3.38.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
